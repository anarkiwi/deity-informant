name: Publish

# Publishes to PyPI via trusted publishing (OIDC). The maintainer must register
# the trusted publisher on PyPI: project deity-informant, owner anarkiwi,
# repo anarkiwi/deity-informant, workflow publish.yml, environment pypi.

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
